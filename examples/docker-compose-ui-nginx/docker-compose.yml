# DOCKER_SOCKET path (override via env variable or .env file):
#   Docker:          DOCKER_SOCKET=/var/run/docker.sock          (default)
#   Podman rootless: DOCKER_SOCKET=/run/user/${UID}/podman/podman.sock
#   Podman rootful:  DOCKER_SOCKET=/run/podman/podman.sock

services:

  docker_compose_ui:
    restart: always
    image: docker-compose-ui
    build: ../..
    container_name: docker_compose_ui
    hostname: docker_compose_ui
    working_dir: '/opt/projects'
    environment:
      WEB_CONSOLE_PATTERN: '/web-console/?cid={containerName}&cmd={command}'
    volumes:
      - '${DOCKER_SOCKET:-/var/run/docker.sock}:/var/run/docker.sock'
      - '../../demo-projects:/opt/projects:ro'

  web_console:
    image: bitbull/docker-exec-web-console
    environment:
      - 'CONTEXT_PATH=/web-console/'
    read_only: true
    restart: always
    volumes:
      - '${DOCKER_SOCKET:-/var/run/docker.sock}:/var/run/docker.sock'

  nginx:
    image: nginx:alpine
    read_only: true
    restart: always
    ports:
      - '8180:80'
    volumes:
      - './default.conf:/etc/nginx/conf.d/default.conf:ro'
      - '/var/cache/nginx/'
      - '/var/run/'
      - '/logs/'
